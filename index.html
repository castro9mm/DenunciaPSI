<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Denúncia Anônima</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      text-align: center;
      padding: 40px;
    }
    h1 {
      margin-bottom: 20px;
    }
    form {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      margin: 0 auto;
    }
    label {
      display: block;
      margin-top: 10px;
      text-align: left;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 6px;
    }
    .file-upload {
      margin-top: 15px;
      margin-bottom: 15px;
      text-align: left;
    }
    .file-upload input[type="file"] {
      display: none;
    }
    .file-upload label {
      background-color: #007bff;
      color: #fff;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s;
      display: inline-block;
    }
    .file-upload label:hover {
      background-color: #0056b3;
    }
    button {
      background-color: #28a745;
      color: #fff;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
      margin-top: 10px;
    }
    button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>
  <h1>Denúncia Anônima de Assédio Moral</h1>

  <form id="denunciaForm" action="https://formspree.io/f/mlgzvypk" method="POST" enctype="multipart/form-data">
    
    <!-- Campos existentes -->
    <label for="nome">Nome (opcional):</label>
    <input type="text" id="nome" name="nome">

    <label for="mensagem">Descrição da denúncia:</label>
    <textarea id="mensagem" name="mensagem" rows="6" required></textarea>

    <!-- Botão estilizado de anexar arquivos -->
    <div class="file-upload">
      <input type="file" id="fileUpload" name="fileUpload" accept=".jpg,.jpeg,.png,.pdf,.doc,.docx">
      <label for="fileUpload">📎 Anexar arquivo (máx. 10MB)</label>
    </div>
