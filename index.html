<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Denúncia Anônima</title>
</head>
<body>
  <h1>Denúncia Anônima de Assédio Moral</h1>

  <form id="denunciaForm" action="https://formspree.io/f/mlgzvypk" method="POST" enctype="multipart/form-data">
    
    <!-- Campos existentes -->
    <label for="nome">Nome (opcional):</label>
    <input type="text" id="nome" name="nome"><br><br>

    <label for="mensagem">Descrição da denúncia:</label><br>
    <textarea id="mensagem" name="mensagem" rows="6" cols="40" required></textarea><br><br>

    <!-- Botão de anexar arquivos -->
    <label for="fileUpload">Anexar arquivo (máx. 10MB):</label>
    <input type="file" id="fileUpload" name="fileUpload" accept=".jpg,.jpeg,.png,.pdf,.doc,.docx"><br><br>

    <!-- Botão de envio -->
    <button type="submit">Enviar</button>
  </form>

  <script>
    document.getElementById("denunciaForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);

      // Validação do tamanho do arquivo
      const file = document.getElementById("fileUpload").files[0];
      if (file && file.size > 10 * 1024 * 1024) {
        alert("O arquivo excede o limite de 10MB.");
        return;
      }

      try {
        const response = await fetch(form.action, {
          method: form.method,
          body: formData,
          headers: { "Accept": "application/json" }
        });

        if (response.ok) {
          alert("✓ Denúncia enviada com sucesso!");
          form.reset();
        } else {
          alert("✗ Houve um erro ao enviar a denúncia. Tente novamente.");
        }
      } catch (error) {
        alert("✗ Houve um erro ao enviar a denúncia. Tente novamente.");
      }
    });
  </script>
</body>
</html>
