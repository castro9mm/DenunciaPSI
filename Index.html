<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Denúncia Anônima de Assédio Moral</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff; /* azul bem clarinho */
            background-image: url("C:\Users\Diogo del Castro\Downloads\logo main com escrita sem fundo.png");
            background-size: cover;
            background-attachment: fixed;
            opacity: 0.7; /* Ajuste de 0 a 1 */
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 50px auto;
            background-color: #ffffff; /* branco */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            font-family: "Playfair Display", serif;
            font-size: 28px;
            color: #003366;
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #003366;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input[type="file"] {
            border: none;
        }
        button {
            margin-top: 20px;
            padding: 12px 20px;
            background-color: #0066cc;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #004d99;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: #333333;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Denúncia Anônima de Assédio Moral</h1>
        <form action="mailto:espacofluxoperfeito@gmail.com" method="post" enctype="text/plain">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome">

            <label for="cargo">Cargo que ocupa:</label>
            <input type="text" id="cargo" name="cargo">

            <label for="tempo">Tempo na Empresa:</label>
            <input type="text" id="tempo" name="tempo">

            <label for="empresa">Nome da Empresa:</label>
            <input type="text" id="empresa" name="empresa">

            <label for="descricao">Descrição Completa:</label>
            <textarea id="descricao" name="descricao" rows="6"></textarea>

            <label for="anexo">Anexos de comprovação:</label>
            <input type="file" id="anexo" name="anexo" multiple>

            <button type="submit">Enviar Denúncia</button>
        </form>
        <div class="footer">
            "Todos os dados aqui declarados estão sob sigilo legal da profissional de saúde mental 
            <strong>Madley Nascimento CRP 12345</strong>"
        </div>
    </div>
</body>
</html>
